services:
  - type: web
    name: dashboard-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: UPLOADS_DIR
        value: /opt/render/project/src/backend/storage/uploads
      - key: PARQUET_DIR
        value: /opt/render/project/src/backend/storage/parquet
      - key: DATA_DIR
        value: /opt/render/project/src/backend/data
      - key: CORS_ORIGINS
        value: https://tu-frontend.onrender.com
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
    disk:
      name: dashboard-storage
      mountPath: /opt/render/project/src/backend/storage
      sizeGB: 1

  - type: web
    name: dashboard-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://dashboard-backend.onrender.com
